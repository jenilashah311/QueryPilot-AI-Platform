services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: saas
      POSTGRES_PASSWORD: saas
      POSTGRES_DB: saas
    ports:
      - "25434:5432"
    volumes:
      - pg_saas_p4:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U saas -d saas"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "26481:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build: ./backend
    ports:
      - "28181:8080"
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql+psycopg2://saas:saas@postgres:5432/saas
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: change-me-in-production-use-long-random
      # OPENAI_*, DEMO_MODE, etc. come only from ../.env (env_file) — do not override with host interpolation
      FRONTEND_ORIGIN: http://localhost:5175
      OAUTH_REDIRECT_URI: http://localhost:28181/oauth/google/callback
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5175:80"
    depends_on:
      - api

volumes:
  pg_saas_p4:
