server {
    listen 80;
    client_max_body_size 25m;
    root /usr/share/nginx/html;
    index index.html;
    location / {
        try_files $uri $uri/ /index.html;
    }
    location /auth/ { proxy_pass http://api:8080; proxy_http_version 1.1; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
    location /me { proxy_pass http://api:8080; proxy_http_version 1.1; proxy_set_header Host $host; proxy_set_header Authorization $http_authorization; }
    location /datasets/ { proxy_pass http://api:8080; proxy_http_version 1.1; proxy_set_header Host $host; proxy_set_header Authorization $http_authorization; }
    location /query { proxy_pass http://api:8080; proxy_http_version 1.1; proxy_set_header Host $host; proxy_set_header Authorization $http_authorization; }
    location /health { proxy_pass http://api:8080; }
    location /billing/ { proxy_pass http://api:8080; proxy_http_version 1.1; proxy_set_header Host $host; }
    location /oauth/ { proxy_pass http://api:8080; proxy_http_version 1.1; proxy_set_header Host $host; }
}
